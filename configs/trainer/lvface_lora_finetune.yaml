# LoRA fine-tune for the LVFace ViT-B backbone on cow re-id.
#
# Strategy: keep all 113M ViT weights frozen and inject LoRA adapters into
# every transformer block's attention + MLP. With rank=8 this gives ~1M
# trainable adapter params (vs 113M end-to-end) — fast to train, tiny
# adapter file, no risk of catastrophic forgetting on the
# face-recognition prior.
#
# target_modules uses PEFT's endswith match on module names. Listing just
# the bare names matches the same module across all 24 blocks in one shot.

optimizer:
  type: AdamW
  params:
    lr: 1.0e-3
    weight_decay: 1.0e-4

lr_schedule:
  type: StepLR
  params:
    step_size: 10
    gamma: 0.5

dataloader:
  train:
    batch_size: 32
    shuffle: True
    num_workers: 4
  val:
    batch_size: 32
    shuffle: False
    num_workers: 2

num_epochs: 30
device: cuda

checkpoint:
  save:
    dir: ./checkpoints/lvface_lora_finetune
    frequency: 5
  load:
    path: ./models/base/LVFace-B_Glint360K_wrapped.pth
    backbone: True       # loads BEFORE LoRA wraps, so strict-match works
    loss: False          # head reinitializes for cow class set
    scheduler: False
    optimizer: False

lora:
  enabled: true
  rank: 8
  alpha: 16.0
  dropout: 0.0
  # PEFT matches with `key.endswith(".<target>")`, so the bare leaf name
  # has to be unique across the whole model. `attn.proj` is fully
  # qualified — using just "proj" would also wrap `patch_embed.proj`
  # (the Conv2d patchifier) and silently double the trainable adapter
  # surface, which is not what we want.
  target_modules:
    # Attention path — most impactful adapters per block
    - "qkv"
    - "attn.proj"
    # MLP path — lets each block adapt its feedforward residual
    - "fc1"
    - "fc2"

  # Full-finetune the feature head (the post-norm flatten + 73728→512 →
  # BN → 512×512 → BN projection). LVFace was trained on Glint360K human
  # faces; that head bakes the embedding into a "human-face-shaped"
  # subspace. Without unfreezing it, cattle features can fit the train
  # set (head memorization via the LoRA-modified backbone) but the test
  # mAP collapses because cluster shape never re-organizes for cows.
  # Adapter-only deltas inside the blocks aren't enough to compensate.
  modules_to_save:
    - "feature"

seed: 42
deterministic: false

amp:
  enabled: true
  dtype: float16

gradient_clip:
  max_norm: 5.0
  norm_type: 2.0

logging:
  tensorboard: true
  log_dir: null

onnx_export:
  enabled: true
  opset: 17
  dynamic_batch: true
