# DINOv3 LoRA fine-tune for the segmented cow-face dataset
# (datasets/ceia_motion_detection_faces — 178 cow identities, 14,863 train
# imgs after dedupe-aware split, median 4 visual clusters/class).
#
# Recipe choice rationale:
#   * DINOv3 ViT-B (768-dim) is self-supervised on 1.7B natural images
#     (LVD-1689M) — generic visual features transfer to cattle better than
#     face-pretrained checkpoints (LVFace-ViT was trained on Glint360K
#     human faces; the inductive bias is wrong for cows).
#   * LoRA keeps the trainable surface ~1.5M params instead of fine-tuning
#     all 86M — protects the small dataset (14k imgs) from catastrophic
#     overfit while still letting attention + MLP shift toward cow faces.
#   * Regularized hyperparams (lr=1e-4, wd=1e-3, rank=4, dropout=0.1) are
#     tuned for low intra-class diversity. See dinov3_lora_regularized.yaml
#     for the rationale vs the unregularized baseline.
#   * CosFace (margin_cosine) loss with s=30, m=0.4 is the angular-margin
#     standard for closed-set identification.
#
# Pair this trainer YAML with:
#   BACKBONE_CONFIG=./configs/backbone/dinov3_vitb16.yaml
#   TRAIN_VAL_TRANSFORMATION_CONFIG=./configs/transformation/train_val/dinov3_augmented.yaml
#   LOSS_CONFIG=./configs/loss/margin_cosine_product.yaml
#   TRAIN_VAL_DATASET_CONFIG=./configs/dataset/train_val/ceia_motion_detection_faces.yaml

optimizer:
  type: AdamW
  params:
    lr: 1.0e-4
    weight_decay: 1.0e-3

lr_schedule:
  type: StepLR
  params:
    step_size: 10
    gamma: 0.5

dataloader:
  train:
    batch_size: 32
    shuffle: True
    num_workers: 4
  val:
    batch_size: 32
    shuffle: False
    num_workers: 2

num_epochs: 30
device: cuda

checkpoint:
  save:
    dir: ./checkpoints/dinov3_lora_cow_faces
    frequency: 5
  load:
    # DINOv3 weights stream from HuggingFace on the first AutoModel call
    # inside DinoV3Backbone.__init__ — no local checkpoint needed for a
    # fresh fine-tune. Set this to a previous .pth only to resume.
    path: null
    backbone: False
    loss: False
    scheduler: False
    optimizer: False

lora:
  enabled: true
  rank: 4
  alpha: 8.0
  dropout: 0.1
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "up_proj"
    - "down_proj"
  # Fully fine-tune the framework's projection head (Linear + BN1d that
  # bridges DINOv3's 768-dim → embedding_size). LoRA deltas inside the
  # transformer blocks can't re-shape the final embedding subspace.
  modules_to_save:
    - "feature"

seed: 42
deterministic: false

amp:
  enabled: true
  dtype: float16

gradient_clip:
  max_norm: 5.0
  norm_type: 2.0

logging:
  tensorboard: true
  log_dir: null

# Inline identification eval every 5 epochs — reports rank-1/5/10/20,
# mAP, CMC against the gallery=val / probe=test layout. Streamed to
# TensorBoard under eval/* so you can watch the actual recognition
# metric move alongside loss/val_loss.
periodic_eval:
  enabled: true
  every_n_epochs: 5
  dataset: identification
  dataset_config: ./configs/dataset/eval/ceia_motion_detection_faces.yaml
  # `lfw_eval` is the generic eval-side transformation (Resize + ToTensor +
  # Normalize); the YAML below supplies ImageNet mean/std so eval inputs match
  # DINOv3's pretraining distribution.
  transformation: lfw_eval
  transformation_config: ./configs/transformation/eval/dinov3.yaml
  evaluator: identification
  evaluator_config: ./configs/evaluator/identification.yaml

onnx_export:
  enabled: true
  opset: 17
  dynamic_batch: true
