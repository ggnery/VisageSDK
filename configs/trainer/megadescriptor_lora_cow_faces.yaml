# MegaDescriptor-T LoRA fine-tune on cow faces.
#
# Por que MegaDescriptor para gado: pretrained em ~1M imagens de
# re-identificação animal (centenas de espécies), o viés indutivo é
# muito mais próximo de "identificar este animal" do que DINOv3
# (imagens naturais genéricas) ou LVFace/IncResV1 (rostos humanos).
# Expectativa: mesmo Tiny (28M params) deve performar muito bem com
# pouco fine-tune.
#
# Pesos baixam do HF Hub na primeira chamada `timm.create_model(...,
# pretrained=True)`. Cache em ~/.cache/huggingface/.
#
# Pair this trainer YAML with:
#   BACKBONE_CONFIG=./configs/backbone/megadescriptor_t_224.yaml
#   TRAIN_VAL_TRANSFORMATION_CONFIG=./configs/transformation/train_val/megadescriptor.yaml
#   LOSS_CONFIG=./configs/loss/margin_cosine_product.yaml    (ou arcface.yaml)
#   TRAIN_VAL_DATASET_CONFIG=./configs/dataset/train_val/ceia_motion_detection_faces.yaml

optimizer:
  type: AdamW
  params:
    lr: 1.0e-4
    weight_decay: 1.0e-3

lr_schedule:
  type: StepLR
  params:
    step_size: 10
    gamma: 0.5

dataloader:
  train:
    batch_size: 32
    shuffle: True
    num_workers: 4
  val:
    batch_size: 32
    shuffle: False
    num_workers: 2

num_epochs: 30
device: cuda

checkpoint:
  save:
    dir: ./checkpoints/megadescriptor_lora_cow_faces
    frequency: 5
  load:
    # Pesos vêm do HF Hub via timm — nenhum checkpoint local necessário
    # para fine-tune fresco. Aponte aqui só pra resumir um treino interrompido.
    path: null
    backbone: False
    loss: False
    scheduler: False
    optimizer: False

lora:
  enabled: true
  rank: 8
  alpha: 16.0
  dropout: 0.1
  # Swin blocks (timm): attn.{qkv, proj} + mlp.{fc1, fc2}. `attn.proj`
  # (não bare `proj`) evita casar com `downsample.reduction` no
  # patch-merging — adapter ali é desperdício e pode atrapalhar a
  # redução espacial entre estágios.
  target_modules:
    - "qkv"
    - "attn.proj"
    - "fc1"
    - "fc2"
  # embedding_size == native_dim (768) no backbone YAML → feature head
  # é nn.Identity(). Sem nada pra full-finetune fora dos adapters.
  modules_to_save: []

seed: 42
deterministic: false

amp:
  enabled: true
  dtype: float16

gradient_clip:
  max_norm: 5.0
  norm_type: 2.0

logging:
  tensorboard: true
  log_dir: null

# Periodic eval val-gallery — comparável com v1/SOTA/LVFace/IncResV1.
# Usa megadescriptor.yaml (mean/std=0.5) para bater com o pretraining
# distribution; lfw.yaml também serviria já que tem mean/std=0.5.
periodic_eval:
  enabled: true
  every_n_epochs: 5
  dataset: identification
  dataset_config: ./configs/dataset/eval/ceia_motion_detection_faces.yaml
  transformation: lfw_eval
  transformation_config: ./configs/transformation/eval/megadescriptor.yaml
  evaluator: identification
  evaluator_config: ./configs/evaluator/identification.yaml

onnx_export:
  enabled: true
  # Swin's window-attention roll/unroll é levemente exigente — opset 17
  # cobre. Se exportar L-384 e der erro de operador, suba pra 18.
  opset: 17
  dynamic_batch: true
