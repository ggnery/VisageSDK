# LVFace ViT-B + CosFace LoRA fine-tune on cow faces.
#
# Cuidados específicos do LVFace vs DINOv3:
#   * Input é 112×112 (vs 224×224 do DINOv3). Os crops segmentados de vaca
#     (~250-400 px) sofrem downscale agressivo → algum detalhe se perde.
#     Normal pra ArcFace-style FR; só não compare a métrica diretamente.
#   * Pretreinado em Glint360K (rostos humanos), então a `feature` head
#     codifica embeddings num subspace "cara humana". É essencial deixar
#     `modules_to_save: ["feature"]` para a head se reorganizar pra vaca —
#     sem isso o train_acc sobe mas o rank-1 trava baixo.
#   * Loss head reinicia: `checkpoint.load.loss: False` (Glint360K tem 360k
#     classes, aqui são 178; o head tem dim incompatível).
#
# Pair this trainer YAML with:
#   BACKBONE_CONFIG=./configs/backbone/lvface_vit_b.yaml
#   TRAIN_VAL_TRANSFORMATION_CONFIG=./configs/transformation/train_val/vgg_face2_augmented.yaml
#   LOSS_CONFIG=./configs/loss/margin_cosine_product.yaml   (CosFace s=30, m=0.4)
#   TRAIN_VAL_DATASET_CONFIG=./configs/dataset/train_val/ceia_motion_detection_faces.yaml

optimizer:
  type: AdamW
  params:
    lr: 1.0e-3
    weight_decay: 1.0e-4

lr_schedule:
  type: StepLR
  params:
    step_size: 10
    gamma: 0.5

dataloader:
  train:
    batch_size: 32
    shuffle: True
    num_workers: 4
  val:
    batch_size: 32
    shuffle: False
    num_workers: 2

num_epochs: 30
device: cuda

checkpoint:
  save:
    dir: ./checkpoints/lvface_cosface_cow_faces
    frequency: 5
  load:
    # Wrapped LVFace-B checkpoint — gerar com scripts/wrap_lvface_pretrained.py
    # se não existir (input: models/base/LVFace-B_Glint360K.pt → output: o path abaixo).
    path: ./models/base/LVFace-B_Glint360K_wrapped.pth
    backbone: True       # carrega ANTES do LoRA envolver, então strict-match passa
    loss: False          # head reinicia pro novo class set (178 vacas)
    scheduler: False
    optimizer: False

lora:
  enabled: true
  rank: 8
  alpha: 16.0
  dropout: 0.1
  # PEFT bate `key.endswith(".<target>")`. `attn.proj` (não só "proj") evita
  # casar com `patch_embed.proj` (o Conv2d do patch embed) que duplicaria
  # silenciosamente a superfície treinável.
  target_modules:
    - "qkv"
    - "attn.proj"
    - "fc1"
    - "fc2"
  # A head do LVFace é grande (Linear 73728→512 + BN + Linear 512×512 + BN).
  # Deixar fully-trainable é o que reorganiza o subspace de "rosto humano"
  # pra "rosto bovino" — LoRA dentro dos blocos não consegue compensar isso.
  modules_to_save:
    - "feature"

seed: 42
deterministic: false

amp:
  enabled: true
  dtype: float16

gradient_clip:
  max_norm: 5.0
  norm_type: 2.0

logging:
  tensorboard: true
  log_dir: null

# Periodic eval idêntico ao v1/SOTA do DINOv3 (val-gallery, comparável).
periodic_eval:
  enabled: true
  every_n_epochs: 5
  dataset: identification
  dataset_config: ./configs/dataset/eval/ceia_motion_detection_faces.yaml
  # `lfw_eval` reusa o mean/std do YAML — passe o vgg_face2 (mean/std=0.5),
  # NÃO o dinov3.yaml (ImageNet mean/std) — distribuição de input precisa
  # bater com o que o LVFace viu no pretraining.
  transformation: lfw_eval
  transformation_config: ./configs/transformation/eval/lfw.yaml
  evaluator: identification
  evaluator_config: ./configs/evaluator/identification.yaml

onnx_export:
  enabled: true
  opset: 17
  dynamic_batch: true
