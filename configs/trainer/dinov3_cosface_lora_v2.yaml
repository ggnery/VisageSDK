# DINOv3 LoRA fine-tune for cow faces — v2 (regularized).
#
# v1 results (./runs/trains/2026-05-17T02-11-52_dinov3_cow_faces_v1):
#   * train_loss → 0.003, val_loss = 4.08 — big gap (CosFace amplification)
#   * rank-1 plateaued at 83.9%, mAP at 80.7% from epoch 10 onward
#   * early stopper triggered at epoch 20/30
#
# v2 changes (highest-impact first):
#   1. Pair with dinov3_vitb16_native.yaml (embedding_size: 768) → drops
#      the Linear+BN projection head entirely (-394K trainable params,
#      keeps embeddings on the pretrained DINOv3 manifold)
#   2. Pair with margin_cosine_soft.yaml (s=20, m=0.2) → much
#      less CosFace punishment, val_loss will drop substantially
#   3. LoRA rank 4 → 2, alpha 8 → 4 (-332K params; ratio alpha/rank=2 kept)
#   4. LoRA dropout 0.1 → 0.2 (per-adapter regularization)
#   5. Pair with dinov3_strong_aug.yaml (stronger crop/rotation/jitter)
#
# Pair this trainer YAML with:
#   BACKBONE_CONFIG=./configs/backbone/dinov3_vitb16_native.yaml
#   TRAIN_VAL_TRANSFORMATION_CONFIG=./configs/transformation/train_val/dinov3_strong_aug.yaml
#   LOSS_CONFIG=./configs/loss/margin_cosine_soft.yaml
#   TRAIN_VAL_DATASET_CONFIG=./configs/dataset/train_val/ceia_motion_detection_faces.yaml

optimizer:
  type: AdamW
  params:
    lr: 1.0e-4
    weight_decay: 1.0e-3

lr_schedule:
  type: StepLR
  params:
    step_size: 10
    gamma: 0.5

dataloader:
  train:
    batch_size: 32
    shuffle: True
    num_workers: 4
  val:
    batch_size: 32
    shuffle: False
    num_workers: 2

num_epochs: 30
device: cuda

checkpoint:
  save:
    dir: ./checkpoints/dinov3_cosface_lora_v2
    frequency: 5
  load:
    path: null
    backbone: False
    loss: False
    scheduler: False
    optimizer: False

lora:
  enabled: true
  rank: 2
  alpha: 4.0
  dropout: 0.2
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "up_proj"
    - "down_proj"
  # No modules_to_save: feature head is nn.Identity() when embedding_size
  # equals DINOv3's native hidden_size (768 for ViT-B), so there's nothing
  # to fully fine-tune outside the LoRA adapters.
  modules_to_save: []

seed: 42
deterministic: false

amp:
  enabled: true
  dtype: float16

gradient_clip:
  max_norm: 5.0
  norm_type: 2.0

logging:
  tensorboard: true
  log_dir: null

periodic_eval:
  enabled: true
  every_n_epochs: 5
  dataset: identification
  dataset_config: ./configs/dataset/eval/ceia_motion_detection_faces.yaml
  transformation: lfw_eval
  transformation_config: ./configs/transformation/eval/dinov3.yaml
  evaluator: identification
  evaluator_config: ./configs/evaluator/identification.yaml

onnx_export:
  enabled: true
  opset: 17
  dynamic_batch: true
