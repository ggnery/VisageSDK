# End-to-end fine-tune for margin_cosine on the cow datasets. Differs from
# head_only_finetune.yaml in two critical ways:
#
# 1. Backbone is partially UN-frozen (last_linear + last_bn + block8). With
#    a fully frozen backbone the margin_cosine head has no chance: vggface2
#    embeddings are not angularly trained for cows, so the angular margin
#    cannot tighten clusters that don't exist. Letting the last block adapt
#    is the minimum viable change.
#
# 2. Discriminative learning rates: loss head trains at 1e-3 (typical),
#    unfrozen backbone layers at 1e-5 (gentle nudge — they're already in a
#    decent neighborhood for face-like inputs). Default lr=1e-5 protects
#    anything not matched by a pattern.
#
# Use cases: any cow dataset (num_classes auto-injected from the dataset
# YAML). The backbone checkpoint stays the wrapped vggface2.

optimizer:
  type: Adam
  params:
    lr: 1.0e-5
    weight_decay: 1.0e-4

  # Patterns are matched against `backbone.<name>` and `loss.<name>` (the
  # optimizer prefixes the named_parameters keys before matching).
  param_groups:
    - pattern: "loss.*"
      lr: 1.0e-3            # margin_cosine `weight` matrix learns from scratch
    - pattern: "backbone.last_linear*"
      lr: 1.0e-5
    - pattern: "backbone.last_bn*"
      lr: 1.0e-5
    - pattern: "backbone.block8.*"
      lr: 1.0e-5

lr_schedule:
  type: StepLR
  params:
    step_size: 10
    gamma: 0.5

dataloader:
  train:
    batch_size: 32
    shuffle: True
    num_workers: 4
  val:
    batch_size: 32
    shuffle: False
    num_workers: 2

num_epochs: 30
device: cuda

checkpoint:
  save:
    dir: ./checkpoints/partial_unfreeze_finetune
    frequency: 5
  load:
    path: ./models/base/vggface2_wrapped.pth
    backbone: True
    loss: False           # head reinitialized for the cow class set + angular margin
    scheduler: False
    optimizer: False

freeze:
  # Freeze every backbone parameter NOT matched here. Patterns are matched
  # against the bare backbone parameter names (no "backbone." prefix — the
  # freezer iterates `backbone.named_parameters()`).
  except:
    - "last_linear*"
    - "last_bn*"
    - "block8.*"

seed: 42
deterministic: false

amp:
  enabled: true
  dtype: float16

gradient_clip:
  max_norm: 5.0
  norm_type: 2.0

logging:
  tensorboard: true
  log_dir: null

onnx_export:
  enabled: true
  opset: 17
  dynamic_batch: true
