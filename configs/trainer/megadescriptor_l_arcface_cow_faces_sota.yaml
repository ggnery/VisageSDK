# MegaDescriptor-L-384 + ArcFace LoRA — receita SOTA pra animal re-id.
#
# Mesma estrutura do v2 do Tiny (head + LoRA grande + cosine warmup),
# mas com o Large variant pra capacity match com DINOv3-L/B:
#   * Backbone 228M params (Swin Large @ 384²) vs Tiny 28M (8× mais)
#   * Input 384×384 vs 224× (mais detalhe espacial — cattle face é grande
#     o suficiente pra que isso ajude)
#   * batch_size 32 → 16 pra caber em VRAM razoável (~16GB com AMP fp16)
#
# Pair this trainer YAML with:
#   BACKBONE_CONFIG=./configs/backbone/megadescriptor_l_384_head.yaml
#   TRAIN_VAL_TRANSFORMATION_CONFIG=./configs/transformation/train_val/megadescriptor.yaml
#   LOSS_CONFIG=./configs/loss/arcface.yaml
#   TRAIN_VAL_DATASET_CONFIG=./configs/dataset/train_val/ceia_motion_detection_faces.yaml
#
# Dicas:
#   * Se OOM, baixar batch_size pra 8 (e dobrar grad accumulation seria
#     o ideal, mas o framework não tem isso — só roda menor).
#   * Tempo estimado: ~2-4× mais lento que o T v2 por epoch. 50 epochs
#     pode levar 2-4h num 4090; ~1h num H100.

optimizer:
  type: AdamW
  params:
    lr: 5.0e-4
    weight_decay: 1.0e-4

lr_schedule:
  type: CosineWarmup
  params:
    warmup_epochs: 5
    total_epochs: 50
    start_factor: 0.01
    eta_min: 1.0e-6

dataloader:
  train:
    batch_size: 16
    shuffle: True
    num_workers: 4
  val:
    batch_size: 16
    shuffle: False
    num_workers: 2

num_epochs: 50
device: cuda

checkpoint:
  save:
    dir: ./checkpoints/megadescriptor_l_arcface_cow_faces_sota
    frequency: 5
  load:
    path: null
    backbone: False
    loss: False
    scheduler: False
    optimizer: False

lora:
  enabled: true
  rank: 16
  alpha: 32.0
  dropout: 0.1
  target_modules:
    - "qkv"
    - "attn.proj"
    - "fc1"
    - "fc2"
  # Projection head Linear(1536→512) + BN — single biggest lever pra
  # reshape do subspace wildlife → cow.
  modules_to_save:
    - "feature"

seed: 42
deterministic: false

amp:
  enabled: true
  dtype: float16

gradient_clip:
  max_norm: 5.0
  norm_type: 2.0

logging:
  tensorboard: true
  log_dir: null

periodic_eval:
  enabled: true
  every_n_epochs: 5
  dataset: identification
  dataset_config: ./configs/dataset/eval/ceia_motion_detection_faces.yaml
  transformation: lfw_eval
  transformation_config: ./configs/transformation/eval/megadescriptor.yaml
  evaluator: identification
  evaluator_config: ./configs/evaluator/identification.yaml

onnx_export:
  enabled: true
  # Swin-L @ 384 tem mais ops específicas de window-attention; se opset 17
  # der erro de operador, suba pra 18.
  opset: 17
  dynamic_batch: true
