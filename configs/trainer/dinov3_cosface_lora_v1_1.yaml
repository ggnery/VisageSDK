# DINOv3-B v1.1 — v1 exato + apenas stronger aug.
#
# Controle limpo pra testar UMA intervenção de regularização sobre o v1
# (rank-1 83.9%). O v2 foi mau experimento — mudei 4 coisas ao mesmo
# tempo (backbone native + soft CosFace + rank 4→2 + strong aug) e o
# resultado piorou (76.9%), impossível saber qual lever causou o quê.
#
# Aqui mudo só UMA coisa: transformation passa de dinov3_augmented.yaml
# (scale=[0.7,1.0], rotation=25, color_jitter=0.3) para dinov3_strong_aug.yaml
# (scale=[0.5,1.0], rotation=35, color_jitter=0.4). Tudo o mais idêntico
# ao v1.
#
# Hipótese: aug mais forte atrasa a memorização sem reduzir capacity.
# Train_acc ainda chegará a 100% (inevitável nesse dataset) mas talvez
# 2-3 epochs depois, e rank-1 talvez ganhe 1-2pp pelo trajeto mais limpo.
#
# Pair this trainer YAML with:
#   BACKBONE_CONFIG=./configs/backbone/dinov3_vitb16.yaml              (igual v1)
#   TRAIN_VAL_TRANSFORMATION_CONFIG=./configs/transformation/train_val/dinov3_strong_aug.yaml  (MUDOU)
#   LOSS_CONFIG=./configs/loss/margin_cosine.yaml              (igual v1, CosFace)
#   TRAIN_VAL_DATASET_CONFIG=./configs/dataset/train_val/ceia_motion_detection_faces.yaml

optimizer:
  type: AdamW
  params:
    lr: 1.0e-4
    weight_decay: 1.0e-3

lr_schedule:
  type: StepLR
  params:
    step_size: 10
    gamma: 0.5

dataloader:
  train:
    batch_size: 32
    shuffle: True
    num_workers: 4
  val:
    batch_size: 32
    shuffle: False
    num_workers: 2

num_epochs: 30
device: cuda

checkpoint:
  save:
    dir: ./checkpoints/dinov3_cosface_lora_v1_1
    frequency: 5
  load:
    path: null
    backbone: False
    loss: False
    scheduler: False
    optimizer: False

lora:
  enabled: true
  rank: 4
  alpha: 8.0
  dropout: 0.1
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "up_proj"
    - "down_proj"
  modules_to_save:
    - "feature"

seed: 42
deterministic: false

amp:
  enabled: true
  dtype: float16

gradient_clip:
  max_norm: 5.0
  norm_type: 2.0

logging:
  tensorboard: true
  log_dir: null

periodic_eval:
  enabled: true
  every_n_epochs: 5
  dataset: identification
  dataset_config: ./configs/dataset/eval/ceia_motion_detection_faces.yaml
  transformation: lfw_eval
  transformation_config: ./configs/transformation/eval/dinov3.yaml
  evaluator: identification
  evaluator_config: ./configs/evaluator/identification.yaml

onnx_export:
  enabled: true
  opset: 17
  dynamic_batch: true
