[project]
name = "visage-sdk"
version = "0.1.0"
description = "Modular face recognition training framework"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.12"
dependencies = [
    "torch>=2.7,<3",
    "torchvision>=0.22,<1",
    "pyyaml>=6.0",
    "matplotlib>=3.10",
    "tqdm>=4.67",
    "python-dotenv>=1.1",
    "numpy>=1.26",
    "tensorboard>=2.16",
    "streamlit>=1.30",
    "pandas>=2.0",
    "pillow>=10",
]

[tool.uv]
package = false

